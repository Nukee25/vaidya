version: '3.8'

services:
  frontend:
    build: ./frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    networks:
      - publicweb
      - api

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=mysql://root:password@mariadb:3306/vaidya
      - OLLAMA_URL=http://ollama:11434
    networks:
      - api

  mariadb:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=vaidya
    volumes:
      - ./mariadb-data:/var/lib/mysql
    networks:
      - api

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./ollama-data:/root/.ollama
    networks:
      - api

networks:
  api:
  publicweb:
    external: true