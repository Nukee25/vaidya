version: '3.8'

services:
  frontend:
    build: ./frontend
    environment:
      - REACT_APP_API_URL=http://backend:8000/api
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
    networks:
      - publicweb
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=mysql://root:password@mariadb:3306/vaidya?charset=utf8mb4
      - OLLAMA_HOST=http://ollama:11434
      - DJANGO_DEBUG=true
      - DJANGO_ALLOWED_HOSTS=*
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=vaidya-admin-dev
    networks:
      - publicweb
      - api
    volumes:
      - ./backend:/app

  mariadb:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=vaidya
    volumes:
      - ./mariadb-data:/var/lib/mysql
    networks:
      - api

  ollama:
    image: ollama/ollama:rocm
    volumes:
      - ./ollama-data:/root/.ollama
    networks:
      - api

networks:
  api:
  publicweb:
    external: true
